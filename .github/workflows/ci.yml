name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ruff
        run: uv run ruff check src tests

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install hledger
        run: |
          curl -sLO https://github.com/simonmichael/hledger/releases/download/1.52/hledger-linux-x64.tar.gz
          tar -xzf hledger-linux-x64.tar.gz
          sudo mv hledger /usr/local/bin/hledger

      - name: Configure git
        run: git config --global init.defaultBranch main

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests with coverage
        run: uv run pytest --cov-report=json
